kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: gcsfusecsi-node
spec:
  selector:
    matchLabels:
      k8s-app: gcs-fuse-csi-driver
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: "runtime/default"
      labels:
        k8s-app: gcs-fuse-csi-driver
    spec:
      hostNetwork: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      priorityClassName: csi-gcp-gcs-node
      serviceAccount: gcsfusecsi-node-sa
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: gcs-fuse-csi-driver
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          image: gke.gcr.io/gcs-fuse-csi-driver
          imagePullPolicy: IfNotPresent
          args:
            - --v=5
            - --endpoint=unix:/csi/csi.sock
            - --nodeid=$(KUBE_NODE_NAME)
            - --node=true
            - --identity-provider=$(IDENTITY_PROVIDER)
            - --identity-pool=$(IDENTITY_POOL)
            - --http-endpoint=:9920
            - --max-metric-collectors=-1
            - --enable-sidecar-bucket-access-check=true
            - --enable-gcsfuse-kernel-params=true
            - --enable-gcsfuse-profiles=true
            - --enable-gcsfuse-profiles-internal=true
            - --stream-metrics-export=true
            - --enable-cloud-profiler-for-driver=true
            - --enable-auto-gomemlimit=true
            - --auto-gomemlimit-ratio=0.95
            - --universe-domain=$(UNIVERSE_DOMAIN)
          ports:
            - containerPort: 9920
              name: metrics
          resources:
            limits:
              cpu: 200m
              memory: 200Mi
            requests:
              cpu: 5m
              memory: 10Mi
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: IDENTITY_PROVIDER
              value: ""
            - name: IDENTITY_POOL
              value: ""
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: UNIVERSE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: gcsfusecsi-node-config
                  key: universe-domain
          volumeMounts:
            - name: kubelet-pods-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: "Bidirectional"
            - name: kubelet-plugins-dir
              mountPath: /var/lib/kubelet/plugins/kubernetes.io/csi/gcsfuse.csi.storage.gke.io
              mountPropagation: "Bidirectional"
            - name: socket-dir
              mountPath: /csi
            - name: fuse-socket-dir
              mountPath: /sockets
            - name: host-sysfs
              mountPath: /sys
            - name: host-iproute
              mountPath: /etc/iproute2
            - name: tmp
              mountPath: /tmp
        - name: csi-driver-registrar
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar
          imagePullPolicy: IfNotPresent
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)"
          resources:
            limits:
              cpu: 50m
              memory: 100Mi
            requests:
              cpu: 10m
              memory: 10Mi
          env:
            - name: DRIVER_REG_SOCK_PATH
              value: /var/lib/kubelet/plugins/gcsfuse.csi.storage.gke.io/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
      volumes:
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: kubelet-pods-dir
          hostPath:
            path: /var/lib/kubelet/pods/
            type: Directory
        - name: kubelet-plugins-dir
          hostPath:
            path: /var/lib/kubelet/plugins/kubernetes.io/csi/gcsfuse.csi.storage.gke.io/
            type: DirectoryOrCreate
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/gcsfuse.csi.storage.gke.io/
            type: DirectoryOrCreate
        - name: fuse-socket-dir
          emptyDir: {}
        - name: host-sysfs
          hostPath:
            path: /sys
            type: Directory
        - name: host-iproute
          hostPath:
            path: /etc/iproute2
            type: Directory
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
      # https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
      # See "special case". This will tolerate everything. Node component should
      # be scheduled on all nodes.
      tolerations:
        - operator: Exists
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcsfusecsi-image-config
data:
  sidecar-image: gke.gcr.io/gcs-fuse-csi-driver-sidecar-mounter
  metadata-sidecar-image: gke.gcr.io/gcs-fuse-csi-driver-metadata-prefetch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcsfusecsi-node-config
data:
  universe-domain: googleapis.com
