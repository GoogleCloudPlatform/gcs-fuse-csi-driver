apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-fuse-csi-controller
spec:
  template:
    spec:
      containers:
        - name: csi-attacher
          image: registry.k8s.io/sig-storage/csi-attacher
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--http-endpoint=:29634"
            - "--leader-election=true"
            - "--leader-election-namespace=$(CLOUDSTORAGECSI_NAMESPACE)"
            - "--timeout=250s"
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 10m
              memory: 20Mi
          env:
            - name: CLOUDSTORAGECSI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 29634
              name: http-endpoint
              protocol: TCP
          livenessProbe:
            failureThreshold: 1
            httpGet:
              path: /healthz/leader-election
              port: http-endpoint
            initialDelaySeconds: 10
            timeoutSeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
